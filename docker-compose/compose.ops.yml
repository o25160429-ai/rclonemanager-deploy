# ================================================================
#  compose.ops.yml — Operational Tools
#  Feature-flagged via ENABLE_* env vars → dc.sh sets --profile
#
#  Profiles:
#    dozzle         — real-time container log viewer
#    filebrowser    — web file manager (mounts workspace + .docker-volumes)
#    rclone-gui     — built-in rclone web GUI backed by selected configs
#    webssh-linux   — browser SSH terminal (Linux runner)
#    webssh-windows — socat bridge to host ttyd (Windows runner)
#
#  Subdomain convention (auto-generated, no manual config):
#    logs.${PROJECT_NAME}.${DOMAIN}
#    files.${PROJECT_NAME}.${DOMAIN}
#    rclone-gui.${DOMAIN}
#    ttyd.${PROJECT_NAME}.${DOMAIN}
#
#  Optional localhost ports for Tailscale/host access:
#    DOZZLE_HOST_PORT=18080
#    FILEBROWSER_HOST_PORT=18081
#    RCLONE_MANAGER_GUI_HOST_PORT=5572
#    WEBSSH_HOST_PORT=17681
#  Optional bind IP for direct Tailnet access by host ports:
#    OPS_HOST_BIND_IP=0.0.0.0
# ================================================================

services:
  # ── Dozzle: real-time container logs ──────────────────────────
  dozzle:
    profiles: [dozzle]
    image: amir20/dozzle:v10.3.3
    container_name: "dozzle"
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    environment:
      DOZZLE_NO_ANALYTICS: "true"
    ports:
      - "${OPS_HOST_BIND_IP:-127.0.0.1}:${DOZZLE_HOST_PORT:-18080}:8080"
    labels:
      - "caddy=http://logs.${PROJECT_NAME}.${DOMAIN}, http://logs.${DOMAIN}, http://dozzle.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 8080}}"
      # Lỗi aborting with incomplete response với SSE (text/event-stream) qua Caddy reverse proxy
      #   — cần thêm flush_interval -1 để Caddy không buffer response mà stream thẳng về client.
      - "caddy.reverse_proxy.flush_interval=-1" # ← thêm dòng này
      - "caddy.basic_auth="
      - "caddy.basic_auth.${CADDY_AUTH_USER:-admin}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped

  # ── Filebrowser: browse and download log files ─────────────────
  filebrowser:
    profiles: [filebrowser]
    image: filebrowser/filebrowser:v2.30.0
    container_name: "filebrowser"
    command: --noauth --port 80 --root /srv --database /database/filebrowser.db
    ports:
      - "${OPS_HOST_BIND_IP:-127.0.0.1}:${FILEBROWSER_HOST_PORT:-18081}:80"
    volumes:
      - .:/srv/workspace # browse all project files
      - type: bind
        source: ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}
        target: /srv/docker-volumes
        bind:
          propagation: rshared
        # rclone mounts are created under this root and edited through Filebrowser.
      - ./logs:/srv/logs:ro # optional direct logs shortcut
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/filebrowser/database:/database
    labels:
      - "caddy=http://files.${PROJECT_NAME}.${DOMAIN}, http://files.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 80}}"
      - "caddy.basic_auth="
      - "caddy.basic_auth.${CADDY_AUTH_USER:-admin}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped

  # ── Rclone GUI: built-in rclone web UI over selected configs ───
  rclone-manager-gui:
    profiles: [rclone-gui]
    image: rclone/rclone:latest
    container_name: "rclone-manager-gui"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p /config/rclone "${RCLONE_MANAGER_GUI_CONTAINER_CACHE_DIR:-/cache}"
        touch "${RCLONE_MANAGER_GUI_CONTAINER_CONFIG_PATH:-/config/rclone/rclone.conf}"
        set -- rcd \
          --rc-web-gui \
          --rc-web-gui-no-open-browser \
          --rc-addr ":${RCLONE_MANAGER_GUI_PORT:-5572}" \
          --config "${RCLONE_MANAGER_GUI_CONTAINER_CONFIG_PATH:-/config/rclone/rclone.conf}" \
          --cache-dir "${RCLONE_MANAGER_GUI_CONTAINER_CACHE_DIR:-/cache}"
        patch_caddy_auth_webgui() {
          [ "${RCLONE_MANAGER_GUI_CADDY_AUTH_COMPAT:-true}" = "true" ] || return 0
          cache_dir="${RCLONE_MANAGER_GUI_CONTAINER_CACHE_DIR:-/cache}"
          patched_marker="/tmp/rclone-webgui-auth-patched"
          rm -f "$$patched_marker"
          for i in $(seq 1 60); do
            for file in $(find "$$cache_dir" -type f -name "*.js" 2>/dev/null); do
              if grep -q 'headers.Authorization="Basic "+localStorage.getItem' "$$file"; then
                sed -i \
                  -e 's/e\.headers\.Authorization="Basic "+localStorage\.getItem(l\.a),//g' \
                  -e 's/e\.baseURL=localStorage\.getItem(l\.c),/e.baseURL=window.location.origin,/g' \
                  -e 's/e\.headers\.Authorization="Basic "+localStorage\.getItem(D\.a),//g' \
                  -e 's/e\.baseURL=localStorage\.getItem("ipAddress"),/e.baseURL=window.location.origin,/g' \
                  "$$file" || true
                touch "$$patched_marker"
              fi
            done
            if [ -f "$$patched_marker" ]; then
              echo "Patched rclone WebUI JS for Caddy Basic Auth compatibility."
              return 0
            fi
            sleep 2
          done
          echo "No rclone WebUI JS auth patch target found under $${cache_dir}." >&2
        }
        patch_caddy_auth_webgui &
        if [ "${RCLONE_MANAGER_GUI_WEB_GUI_UPDATE:-true}" = "true" ]; then
          set -- "$@" --rc-web-gui-update
        fi
        if [ -n "${RCLONE_MANAGER_GUI_RC_USER:-}" ] && [ -n "${RCLONE_MANAGER_GUI_RC_PASS:-}" ]; then
          set -- "$@" --rc-user "${RCLONE_MANAGER_GUI_RC_USER}" --rc-pass "${RCLONE_MANAGER_GUI_RC_PASS}"
        else
          set -- "$@" --rc-no-auth
        fi
        if [ -n "${RCLONE_MANAGER_GUI_RC_ALLOW_ORIGIN:-}" ]; then
          set -- "$@" --rc-allow-origin "${RCLONE_MANAGER_GUI_RC_ALLOW_ORIGIN}"
        fi
        exec rclone "$@" ${RCLONE_MANAGER_GUI_EXTRA_ARGS:-}
    env_file:
      - ./.env
    ports:
      - "${OPS_HOST_BIND_IP:-127.0.0.1}:${RCLONE_MANAGER_GUI_HOST_PORT:-5572}:${RCLONE_MANAGER_GUI_PORT:-5572}"
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/rclone-manager-gui/config:/config/rclone
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/rclone-manager-gui/cache:/cache
    labels:
      - "caddy=http://${RCLONE_MANAGER_GUI_CADDY_HOSTS:-rclone-gui.localhost}"
      - "caddy.reverse_proxy={{upstreams ${RCLONE_MANAGER_GUI_PORT:-5572}}}"
      - "caddy.basic_auth="
      - "caddy.basic_auth.${CADDY_AUTH_USER:-admin}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped

  # ── WebSSH (Linux): ttyd container → SSH into host runner ──────
  webssh:
    container_name: "webssh"
    profiles: [webssh-linux]
    build: ./services/webssh
    command:
      - "ttyd"
      - "-W"
      - "ssh"
      - "-i"
      - "/root/.ssh/id_rsa"
      - "-o"
      - "StrictHostKeyChecking=no"
      - "-o"
      - "UserKnownHostsFile=/dev/null"
      - "-o"
      - "ConnectTimeout=10"
      - "-t"
      - "${CUR_WHOAMI:-runner}@host.docker.internal"
      - "cd ${CUR_WORK_DIR:-/home/runner} && exec ${SHELL:-/bin/bash}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPS_HOST_BIND_IP:-127.0.0.1}:${WEBSSH_HOST_PORT:-17681}:7681"
    volumes:
      - ./services/webssh/.ssh:/root/.ssh:ro
    labels:
      - "caddy=http://ttyd.${PROJECT_NAME}.${DOMAIN}, http://ttyd.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 7681}}"
      - "caddy.basic_auth="
      - "caddy.basic_auth.${CADDY_AUTH_USER:-admin}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped

  # ── WebSSH (Windows): socat bridge → host ttyd process ─────────
  webssh-windows:
    container_name: "webssh-windows"
    profiles: [webssh-windows]
    image: alpine/socat:latest
    command: >
      TCP-LISTEN:7681,fork,reuseaddr
      TCP:host.docker.internal:7681
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPS_HOST_BIND_IP:-127.0.0.1}:${WEBSSH_HOST_PORT:-17681}:7681"
    labels:
      - "caddy=http://ttyd.${PROJECT_NAME}.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 7681}}"
      - "caddy.basic_auth="
      - "caddy.basic_auth.${CADDY_AUTH_USER:-admin}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped
